name: Production Release

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  lint-server:
    uses: ./.github/workflows/lint-server.yml
    secrets: inherit

  lint-client:
    uses: ./.github/workflows/lint-client.yml
    secrets: inherit

  test-server:
    needs: lint-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
      - name: Run server tests
        run: |
          cd server
          go test ./...

  build:
    needs: [test-server, lint-client]
    uses: ./.github/workflows/build-and-push.yml
    with:
      release_tag: "${{ github.event.release.tag_name }},latest"
    secrets: inherit

  deploy-prod:
    needs: build
    uses: ./.github/workflows/deploy.yml
    with:
      environment: prompt-prod-vm
      server_image_tag: ${{ needs.build.outputs.server_image_tag }}
      client_image_tag: ${{ needs.build.outputs.client_image_tag }}
    secrets: inherit
